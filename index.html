<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nathaniel Sicorsicon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .wrapper { max-width: 480px; width: 90%; text-align: center; }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 700; color: #fff;
      margin: 0 auto 1.2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #ffffff; margin-bottom: 0.4rem; }
    .tag {
      display: inline-block;
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.5);
      border-radius: 20px; padding: 4px 16px;
      font-size: 0.78rem; color: #a78bfa;
      margin-bottom: 1.8rem; letter-spacing: 0.06em;
    }
    .contact-list { display: flex; flex-direction: column; gap: 12px; }
    .contact-item {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 16px;
      text-decoration: none;
    }
    .contact-item span { color: #c4b5fd; font-size: 0.9rem; }
    .contact-item svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="avatar">NS</div>
    <h1>Nathaniel Sicorsicon</h1>
    <div class="tag">ICS student at UH Manoa</div>

      <a class="contact-item" href="mailto:nathanielsicorsicon@gmail.com">
        <span>✉️</span>
        <span>nathanielsicorsicon@gmail.com</span>
      </a>
      <div class="contact-item">
        <span>📞</span>
        <span>(808) 386-8993</span>
